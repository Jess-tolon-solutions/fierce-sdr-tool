<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Registered — Fierce Pulse Learning | Fierce, Inc.</title>
    <meta name="description" content="You're registered for Fierce Pulse Learning. Check your email for session details.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-bg: #ffffff;
            --color-text: #0e0e0e;
            --color-accent: #eb7525;
            --color-accent-hover: #d4691f;
            --color-muted: #888888;
            --color-surface: #f7f7f5;
            --font-serif: 'DM Serif Display', serif;
            --font-sans: 'DM Sans', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            font-size: 17px;
            line-height: 1.6;
            color: var(--color-text);
            background-color: var(--color-bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .nav {
            background: var(--color-bg);
            border-bottom: 1px solid rgba(14, 14, 14, 0.06);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 24px;
            color: var(--color-text);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .logo:hover {
            color: var(--color-accent);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
        }

        .confirmation {
            text-align: center;
            max-width: 560px;
        }

        .confirmation-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 32px;
            color: var(--color-accent);
        }

        .confirmation-headline {
            font-family: var(--font-serif);
            font-size: clamp(36px, 5vw, 48px);
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .confirmation-subhead {
            font-size: 20px;
            color: var(--color-text);
            margin-bottom: 48px;
        }

        .session-card {
            border: 2px solid rgba(14, 14, 14, 0.1);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 40px;
            text-align: left;
            background: var(--color-surface);
        }

        .session-card-header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(14, 14, 14, 0.08);
        }

        .session-icon {
            width: 48px;
            height: 48px;
            color: var(--color-accent);
            flex-shrink: 0;
        }

        .session-details {
            flex: 1;
        }

        .session-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }

        .session-topic {
            font-family: var(--font-serif);
            font-size: 24px;
            color: var(--color-text);
            letter-spacing: -0.02em;
        }

        .session-date {
            font-size: 16px;
            color: var(--color-text);
            margin-top: 4px;
        }

        .session-time {
            font-size: 15px;
            color: var(--color-accent);
            font-weight: 500;
            margin-top: 2px;
        }

        .expect-list {
            list-style: none;
        }

        .expect-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 15px;
            color: var(--color-text);
        }

        .expect-item:last-child {
            margin-bottom: 0;
        }

        .expect-item svg {
            width: 20px;
            height: 20px;
            color: var(--color-accent);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .btn {
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 500;
            padding: 16px 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--color-accent);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: var(--color-accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .note {
            margin-top: 32px;
            font-size: 14px;
            color: var(--color-muted);
        }

        /* Footer */
        .footer {
            padding: 40px;
            border-top: 1px solid rgba(14, 14, 14, 0.06);
            margin-top: auto;
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo {
            font-family: var(--font-serif);
            font-size: 20px;
            color: var(--color-text);
            text-decoration: none;
        }

        .footer-copyright {
            font-size: 14px;
            color: var(--color-muted);
        }

        /* Responsive */
        @media (max-width: 680px) {
            .nav-inner {
                padding: 16px 24px;
            }

            .main {
                padding: 60px 24px;
            }

            .session-card {
                padding: 24px;
            }

            .session-card-header {
                flex-direction: column;
                gap: 16px;
            }

            .footer {
                padding: 32px 24px;
            }

            .footer-inner {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="logo">Fierce</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="confirmation">
            <div class="confirmation-icon">
                <svg viewBox="0 0 72 72" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="36" cy="36" r="32"/>
                    <polyline points="22,36 32,46 50,28"/>
                </svg>
            </div>

            <h1 class="confirmation-headline">You're in.</h1>
            <p class="confirmation-subhead">We've saved your seat for Fierce Pulse Learning.</p>

            <div class="session-card">
                <div class="session-card-header">
                    <div class="session-icon">
                        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="6" y="10" width="36" height="32" rx="2"/>
                            <line x1="6" y1="18" x2="42" y2="18"/>
                            <line x1="16" y1="6" x2="16" y2="14"/>
                            <line x1="32" y1="6" x2="32" y2="14"/>
                        </svg>
                    </div>
                    <div class="session-details">
                        <div class="session-label">Your Session</div>
                        <div class="session-topic" id="sessionTopic"></div>
                        <div class="session-date" id="sessionDate"></div>
                        <div class="session-time" id="sessionTime"></div>
                    </div>
                </div>

                <ul class="expect-list">
                    <li class="expect-item">
                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="10" cy="10" r="8"/>
                            <polyline points="10,5 10,10 13,12"/>
                        </svg>
                        <span>30 minutes, fully experiential</span>
                    </li>
                    <li class="expect-item">
                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 8l7 -5l7 5"/>
                            <path d="M5 8v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1 -1v-8"/>
                        </svg>
                        <span>No slides, no pitch — just practice</span>
                    </li>
                    <li class="expect-item">
                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="5" width="14" height="10" rx="1"/>
                            <circle cx="10" cy="10" r="2"/>
                        </svg>
                        <span>Zoom link will arrive in your inbox soon</span>
                    </li>
                </ul>
            </div>

            <a href="#" class="btn btn-primary" id="addToCalendar">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="14" height="14" rx="1"/>
                    <line x1="3" y1="8" x2="17" y2="8"/>
                    <line x1="7" y1="2" x2="7" y2="6"/>
                    <line x1="13" y1="2" x2="13" y2="6"/>
                    <line x1="10" y1="11" x2="10" y2="15"/>
                    <line x1="8" y1="13" x2="12" y2="13"/>
                </svg>
                Add to Calendar
            </a>

            <p class="note">Check your email for confirmation details.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <a href="/" class="footer-logo">Fierce</a>
            <p class="footer-copyright">© 2026 Fierce, Inc.</p>
        </div>
    </footer>

    <script>
        // Session data
        const SESSIONS = {
            may1: {
                date: 'Friday, May 1st',
                time: '11:00am ET',
                topic: 'Feedback',
                calendarStart: '20260501T150000Z',
                calendarEnd: '20260501T153000Z'
            },
            may15: {
                date: 'Friday, May 15th',
                time: '11:00am ET',
                topic: 'Change Management',
                calendarStart: '20260515T150000Z',
                calendarEnd: '20260515T153000Z'
            }
        };

        // Get session from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const sessionKey = urlParams.get('session') || 'may1';
        const session = SESSIONS[sessionKey] || SESSIONS.may1;

        // Populate session details
        document.getElementById('sessionTopic').textContent = session.topic;
        document.getElementById('sessionDate').textContent = session.date;
        document.getElementById('sessionTime').textContent = session.time;

        // Add to Calendar functionality
        document.getElementById('addToCalendar').addEventListener('click', (e) => {
            e.preventDefault();

            const title = `Fierce Pulse Learning: ${session.topic}`;
            const description = 'A 30-minute experiential leadership session from Fierce, Inc. Zoom link will be sent separately.';
            const location = 'Zoom (link to follow)';

            const googleCalendarUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${session.calendarStart}/${session.calendarEnd}&details=${encodeURIComponent(description)}&location=${encodeURIComponent(location)}`;

            window.open(googleCalendarUrl, '_blank');
        });
    </script>
</body>
</html>
